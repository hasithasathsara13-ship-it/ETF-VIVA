<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel QR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="container mt-4">
    
    <div id="alertBox" style="display:none; position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 250px;" class="alert text-center shadow"></div>

    <h2 class="mb-4 text-center">Fuel QR Registration System</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm mb-4">
                <h5 class="mb-3">Register New Vehicle</h5>
                <form id="registerForm">
                    <input type="text" id="regNo" class="form-control mb-2" placeholder="Reg No (e.g. ABC-1234)" required>
                    <input type="text" id="firstName" class="form-control mb-2" placeholder="First Name" required>
                    <input type="text" id="lastName" class="form-control mb-2" placeholder="Last Name" required>
                    <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
                    <input type="text" id="station" class="form-control mb-2" placeholder="Nearest Station" required>
                    <select id="fuelType" class="form-select mb-2">
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Electric">Electric</option>
                    </select>
                    <input type="text" id="nic" class="form-control mb-2" placeholder="Owner NIC" required>
                    <input type="text" id="model" class="form-control mb-3" placeholder="Vehicle Model (e.g. Toyota Vitz)" required>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Register Vehicle</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3 mb-3 shadow-sm bg-light">
                <label class="form-label fw-bold">Search Database:</label>
                <div class="input-group">
                    <select id="searchCriteria" class="form-select" style="max-width: 150px;">
                        <option value="regno">Reg No</option>
                        <option value="firstname">First Name</option>
                        <option value="lastname">Last Name</option>
                        <option value="email">Email</option>
                        <option value="station">Station</option>
                        <option value="fuel">Fuel Type</option>
                        <option value="nic">Owner NIC</option>
                        <option value="model">Vehicle Model</option> </select>
                    <input type="text" id="searchInput" class="form-control" placeholder="Enter search term...">
                    <button class="btn btn-success" id="searchBtn">Search</button>
                    <button class="btn btn-outline-secondary" id="clearBtn">Clear</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="m-0">Registered Vehicles</h5>
                <button id="loadDataBtn" class="btn btn-sm btn-secondary">Refresh List</button>
            </div>
            
            <div class="table-responsive shadow-sm">
                <table class="table table-bordered table-striped table-hover bg-white mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Reg No</th>
                            <th>Owner Name</th>
                            <th>Model</th>
                            <th>Fuel</th>
                            <th>Station</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vehicleTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Vehicle Record</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="updateForm">
                <input type="hidden" id="editRegNo">
                <label class="form-label">Nearest Station</label>
                <input type="text" id="editStation" class="form-control mb-2" required>
                <label class="form-label">Fuel Type</label>
                <select id="editFuelType" class="form-select mb-3">
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                </select>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Update Record</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
