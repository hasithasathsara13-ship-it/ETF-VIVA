<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worker - Fuel Dispenser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; }
    .navbar { background: #0f3460; }
    #alert-box { display: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
  <span class="navbar-brand fw-bold fs-5">⛽ Fuel Station Worker</span>
</nav>

<div class="container">
  <div class="row">

    <!-- Fuel Request Form -->
    <div class="col-md-5 mb-4">
      <div class="card shadow-sm">
        <div class="card-header"><strong>Issue Fuel</strong></div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Vehicle Registration Number</label>
            <input type="text" id="reg-input" class="form-control" placeholder="e.g. CBA-1234">
          </div>
          <div class="mb-3">
            <label class="form-label">Fuel Amount (Liters)</label>
            <input type="number" id="liters-input" class="form-control" placeholder="e.g. 5" min="1">
          </div>
          <button class="btn btn-primary w-100" id="submit-btn">Submit Fuel Request</button>

          <div id="alert-box" class="alert mt-3 mb-0"></div>
        </div>
      </div>
    </div>

    <!-- Past Orders -->
    <div class="col-md-7 mb-4">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <strong>Past Orders</strong>
          <button class="btn btn-sm btn-outline-secondary" id="refresh-btn">↻ Refresh</button>
        </div>
        <div class="card-body p-0">
          <table class="table table-sm table-striped mb-0" id="orders-table">
            <thead class="table-dark">
              <tr>
                <th>Reg Number</th>
                <th>Liters</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="orders-body">
              <tr><td colspan="3" class="text-center py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  const API = 'https://fuelsys-production-c68b.up.railway.app/api';

  function showAlert(message, type) {
    $('#alert-box')
      .removeClass('alert-success alert-danger')
      .addClass('alert-' + type)
      .text(message)
      .show();
  }

  function loadOrders() {
    $.ajax({
      url: API + '/orders',
      method: 'GET',
      success: function(data) {
        const tbody = $('#orders-body');
        tbody.empty();
        if (data.length === 0) {
          tbody.append('<tr><td colspan="3" class="text-center">No orders yet</td></tr>');
          return;
        }
        data.forEach(function(o) {
          const time = new Date(o.created_at).toLocaleString();
          tbody.append(`
            <tr>
              <td><strong>${o.reg_number}</strong></td>
              <td>${o.requested_liters} L</td>
              <td><small class="text-muted">${time}</small></td>
            </tr>
          `);
        });
      },
      error: function() {
        $('#orders-body').html('<tr><td colspan="3" class="text-danger text-center">Failed to load orders.</td></tr>');
      }
    });
  }

  $('#submit-btn').on('click', function() {
    const reg = $('#reg-input').val().trim();
    const liters = $('#liters-input').val().trim();

    if (!reg || !liters) {
      showAlert('Please fill in both fields.', 'danger');
      return;
    }

    $('#submit-btn').prop('disabled', true).text('Submitting...');
    $('#alert-box').hide();

    $.ajax({
      url: API + '/orders',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({ reg_number: reg, requested_liters: Number(liters) }),
      success: function(data) {
        showAlert('Fuel issued: ' + data.requested_liters + 'L for ' + data.reg_number, 'success');
        $('#reg-input').val('');
        $('#liters-input').val('');
        loadOrders();
      },
      error: function(xhr) {
        const msg = xhr.responseJSON ? xhr.responseJSON.error : 'Request failed.';
        showAlert('Error ' + msg, 'danger');
      },
      complete: function() {
        $('#submit-btn').prop('disabled', false).text('Submit Fuel Request');
      }
    });
  });

  $('#refresh-btn').on('click', loadOrders);

  // Load orders on page open
  loadOrders();
</script>
</body>
</html>
